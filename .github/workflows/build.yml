name: Build (desktop installers)

# Builds signed/packaged desktop installers for Windows, macOS and Linux.
# Reusable: release.yml calls this via `uses:`; you can also run it by hand from
# the Actions tab (workflow_dispatch) to get downloadable artifacts for testing.
on:
  workflow_call:
    inputs:
      version:
        description: 'Version string, e.g. 1.2.3 (a leading v is stripped). Blank = pubspec version.'
        type: string
        required: false
        default: ''
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string, e.g. 1.2.3. Blank = pubspec version.'
        type: string
        required: false
        default: ''

env:
  APP_NAME: nexus_projects_client
  PRETTY_NAME: Nexus Projects

jobs:
  # ---------------------------------------------------------------- Windows ---
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve version
        shell: bash
        run: |
          V="${{ inputs.version }}"; V="${V#v}"
          if [ -z "$V" ]; then
            V="$(grep -E '^version:' pubspec.yaml | head -1 | sed -E 's/^version:[[:space:]]*//; s/\+.*$//')"
          fi
          echo "APP_VERSION=$V" >> "$GITHUB_ENV"
          echo "Resolved version: $V"

      - name: Install dependencies
        run: flutter pub get

      # git2dart_binaries' windows/CMakeLists.txt bundles libcrypto-1_1-x64.dll
      # (never shipped — libgit2.dll uses Windows-native TLS) and a versioned
      # libgit2-1.6.2.dll, while the package ships plain libgit2.dll. Fix both.
      - name: Patch git2dart_binaries native lib names (Windows)
        shell: pwsh
        run: |
          $root = if ($env:PUB_CACHE) { $env:PUB_CACHE } else { "$env:LOCALAPPDATA\Pub\Cache" }
          $cm = Get-ChildItem -Path $root -Recurse -Filter CMakeLists.txt -ErrorAction SilentlyContinue |
                Where-Object { $_.FullName -match 'git2dart_binaries' -and $_.FullName -match '\\windows\\' } |
                Select-Object -First 1
          if (-not $cm) { Write-Error 'git2dart_binaries windows/CMakeLists.txt not found'; exit 1 }
          Write-Host "Patching $($cm.FullName)"
          (Get-Content $cm.FullName) |
            Where-Object { $_ -notmatch 'libcrypto-1_1-x64\.dll' } |
            ForEach-Object { $_ -replace 'libgit2-1\.6\.2\.dll','libgit2.dll' } |
            Set-Content $cm.FullName
          Get-Content $cm.FullName | Select-String 'bundled_libraries' -Context 0,4

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Windows (release)
        run: flutter build windows --release --build-name=${{ env.APP_VERSION }} --build-number=${{ github.run_number }}

      - name: Package installer (Inno Setup)
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DAppVersion=$env:APP_VERSION "packaging\windows\installer.iss"

      - uses: actions/upload-artifact@v4
        with:
          name: installer-windows
          path: dist/*.exe
          if-no-files-found: error

  # ------------------------------------------------------------------ macOS ---
  macos:
    runs-on: macos-14
    # A macOS-only failure (e.g. the native-lib bundling step, hard to verify from
    # a non-macOS dev box) must NOT block the Windows + Linux release from
    # publishing. On failure the upload step just doesn't run, so the release goes
    # out without a macOS artifact. Flip back to hard-fail once macOS is verified.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      # Latest stable. (Was pinned to 3.41.9 for the libgit2 bundling crash where
      # newer Flutter's native-assets path links a phantom
      # @rpath/libgit2-experimental.1.9.dylib — but the "Embed & normalize native
      # libraries" step below now rewrites that reference back to the bundled
      # @rpath/libgit2.dylib, so the pin is no longer needed.) The pin also became
      # too old for the riverpod3/analyzer12 deps, which need a newer SDK (meta 1.18).
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve version
        run: |
          V="${{ inputs.version }}"; V="${V#v}"
          if [ -z "$V" ]; then
            V="$(grep -E '^version:' pubspec.yaml | head -1 | sed -E 's/^version:[[:space:]]*//; s/\+.*$//')"
          fi
          echo "APP_VERSION=$V" >> "$GITHUB_ENV"
          echo "Resolved version: $V"

      - name: Install dependencies
        run: flutter pub get
      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      # The build step must NOT require a "Mac Development" cert — the dedicated
      # signing/notarize step below does the real Developer ID signing. Force
      # ad-hoc ("-") manual signing with no team so the unsigned .app builds.
      - name: Disable Xcode signing for the build step
        run: |
          set -euo pipefail
          PBX=macos/Runner.xcodeproj/project.pbxproj
          sed -i '' \
            -e 's/CODE_SIGN_IDENTITY = "Apple Development";/CODE_SIGN_IDENTITY = "-";/g' \
            -e 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' \
            -e 's/DEVELOPMENT_TEAM = YBQ9BU6Q6F;/DEVELOPMENT_TEAM = "";/g' \
            "$PBX"

      - name: Build macOS (release)
        run: flutter build macos --release --build-name=${{ env.APP_VERSION }} --build-number=${{ github.run_number }}

      # git2dart ships libgit2 (built with -DGIT_EXPERIMENTAL_SHA256=ON) + libssh2
      # as CocoaPods 'vendored_libraries'. The runner's linker records libgit2 under
      # its ORIGINAL experimental install name (@rpath/libgit2-experimental.1.9.dylib)
      # rather than the vendored @rpath/libgit2.dylib — the same library, different
      # recorded name — and that name isn't bundled, so the app crashes at launch
      # ("Library not loaded: @rpath/libgit2-experimental…dylib").
      # Fix: bundle the vendored dylibs, then rewrite every experimental libgit2
      # reference across the app's Mach-O binaries back to the bundled @rpath/libgit2.dylib.
      - name: Embed & normalize native libraries (macOS)
        run: |
          set -euo pipefail
          APP="build/macos/Build/Products/Release/${APP_NAME}.app"
          FW="$APP/Contents/Frameworks"
          EXE="$APP/Contents/MacOS/${APP_NAME}"
          mkdir -p "$FW"
          GBDIR="$(dirname "$(find "${PUB_CACHE:-$HOME/.pub-cache}" -path '*git2dart_binaries*/macos/libgit2.dylib' 2>/dev/null | head -1)")"

          # 1) Force-bundle the vendored dylibs and normalize their install names.
          cp -f "$GBDIR/libgit2.dylib" "$FW/libgit2.dylib"
          chmod u+w "$FW/libgit2.dylib"
          install_name_tool -id "@rpath/libgit2.dylib" "$FW/libgit2.dylib"
          # libssh2's filename varies by Flutter/package build (libssh2.1.dylib vs
          # libssh2.dylib). Bundle it under the EXACT name libgit2 references so the
          # @rpath link resolves, finding the real file by glob.
          SSH2_REF="$(otool -L "$FW/libgit2.dylib" | awk '/libssh2/{print $1; exit}')"
          if [ -n "${SSH2_REF:-}" ]; then
            SSH2_NAME="$(basename "$SSH2_REF")"
            SSH2_SRC="$(ls "$GBDIR"/libssh2*.dylib 2>/dev/null | head -1 || true)"
            if [ -n "${SSH2_SRC:-}" ]; then
              cp -f "$SSH2_SRC" "$FW/$SSH2_NAME"
              chmod u+w "$FW/$SSH2_NAME"
              install_name_tool -id "@rpath/$SSH2_NAME" "$FW/$SSH2_NAME"
            else
              echo "::warning::libgit2 references $SSH2_REF but no libssh2*.dylib found in $GBDIR"
            fi
          fi

          # All Mach-O binaries in the bundle (main exe + Frameworks dylibs + framework binaries).
          machos() {
            for b in "$EXE" "$FW"/*.dylib "$FW"/*.framework/Versions/*/*; do
              [ -f "$b" ] || continue
              file "$b" 2>/dev/null | grep -q 'Mach-O' && echo "$b"
            done
          }

          # 2) Normalize the experimental libgit2 reference -> @rpath/libgit2.dylib.
          while IFS= read -r bin; do
            chmod u+w "$bin" 2>/dev/null || true
            otool -L "$bin" 2>/dev/null | awk '/@rpath\/libgit2-experimental/{print $1}' | sort -u | while read -r ref; do
              install_name_tool -change "$ref" "@rpath/libgit2.dylib" "$bin" || true
            done
          done < <(machos)

          # 3) Recursively vendor every NON-system absolute dependency (e.g. Homebrew
          #    libcrypto) into Frameworks and rewrite the reference to @rpath.
          is_external() { case "$1" in /usr/lib/*|/System/*) return 1;; /*) return 0;; *) return 1;; esac; }
          queue=(); while IFS= read -r b; do queue+=("$b"); done < <(machos)
          i=0
          while [ $i -lt ${#queue[@]} ]; do
            bin="${queue[$i]}"; i=$((i+1))
            [ -f "$bin" ] || continue
            chmod u+w "$bin" 2>/dev/null || true
            while IFS= read -r dep; do
              is_external "$dep" || continue
              base="$(basename "$dep")"
              if [ ! -f "$FW/$base" ]; then
                src="$dep"; [ -f "$src" ] || src="$(ls $dep 2>/dev/null | head -1 || true)"
                [ -f "$src" ] || { echo "::error::external dependency not found: $dep"; exit 1; }
                echo "Vendoring $dep -> Frameworks/$base"
                cp -f "$src" "$FW/$base"; chmod u+w "$FW/$base"
                install_name_tool -id "@rpath/$base" "$FW/$base"
                queue+=("$FW/$base")
              fi
              install_name_tool -change "$dep" "@rpath/$base" "$bin"
            done < <(otool -L "$bin" 2>/dev/null | tail -n +2 | awk '{print $1}')
          done

          echo "Frameworks now contains:"; ls -1 "$FW"

          # 4) Verify the bundle is self-contained (no external paths) and complete.
          bad=0
          while IFS= read -r bin; do
            ext="$(otool -L "$bin" 2>/dev/null | tail -n +2 | awk '{print $1}' | grep -E '^/opt/homebrew|^/usr/local' || true)"
            if [ -n "$ext" ]; then echo "::error::$(basename "$bin") still links external:"; echo "$ext"; bad=1; fi
            for ref in $(otool -L "$bin" 2>/dev/null | tail -n +2 | awk '{print $1}' | grep -E '^@rpath/lib' || true); do
              f="${ref#@rpath/}"; [ -f "$FW/$f" ] || { echo "::error::$f referenced by $(basename "$bin") not bundled"; bad=1; }
            done
          done < <(machos)
          [ "$bad" = 0 ] || { echo "Bundle is NOT self-contained (see errors above)."; exit 1; }
          echo "Self-contained: no /opt/homebrew or /usr/local references in the bundle."

      - name: Sign, package (.pkg) and notarize
        env:
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          MACOS_DEV_SIGNING_IDENTITY_KEY: ${{ secrets.MACOS_DEV_SIGNING_IDENTITY_KEY }}
          MACOS_INST_SIGNING_IDENTITY_KEY: ${{ secrets.MACOS_INST_SIGNING_IDENTITY_KEY }}
          MACOS_APP_CONNECT_KEY_GERAMY: ${{ secrets.MACOS_APP_CONNECT_KEY_GERAMY }}
          # notarytool also needs the key id + issuer id of the App Store Connect key:
          MACOS_APP_CONNECT_KEY_ID: ${{ secrets.MACOS_APP_CONNECT_KEY_ID }}
          MACOS_APP_CONNECT_ISSUER_ID: ${{ secrets.MACOS_APP_CONNECT_ISSUER_ID }}
        run: |
          set -euo pipefail
          APP="build/macos/Build/Products/Release/${APP_NAME}.app"
          mkdir -p dist

          if [ -z "${MACOS_DEV_SIGNING_IDENTITY_KEY:-}" ]; then
            echo "::warning::No macOS signing secrets set — producing an UNSIGNED zip."
            ditto -c -k --keepParent "$APP" "dist/${APP_NAME}-${APP_VERSION}-macos-unsigned.zip"
            exit 0
          fi

          # --- temporary keychain with both Developer ID certs ---
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KPWD="$(openssl rand -base64 24)"
          security create-keychain -p "$KPWD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KPWD" "$KEYCHAIN"
          echo "$MACOS_DEV_SIGNING_IDENTITY_KEY"  | base64 --decode > "$RUNNER_TEMP/dev.p12"
          echo "$MACOS_INST_SIGNING_IDENTITY_KEY" | base64 --decode > "$RUNNER_TEMP/inst.p12"
          security import "$RUNNER_TEMP/dev.p12"  -k "$KEYCHAIN" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security import "$RUNNER_TEMP/inst.p12" -k "$KEYCHAIN" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/productbuild
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/"//g')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KPWD" "$KEYCHAIN" >/dev/null

          APP_ID="$(security find-identity -v -p codesigning "$KEYCHAIN" | awk -F'"' '/Developer ID Application/{print $2; exit}')"
          INST_ID="$(security find-identity -v "$KEYCHAIN" | awk -F'"' '/Developer ID Installer/{print $2; exit}')"
          echo "App identity:       $APP_ID"
          echo "Installer identity: $INST_ID"

          # --- sign nested native dylibs first (inside-out), then the app ---
          for lib in "$APP/Contents/Frameworks/"*.dylib; do
            [ -f "$lib" ] && codesign --force --options runtime --timestamp --sign "$APP_ID" "$lib"
          done

          # --- sign the .app with hardened runtime ---
          codesign --force --deep --options runtime --timestamp \
            --entitlements macos/Runner/Release.entitlements \
            --sign "$APP_ID" "$APP"
          codesign --verify --deep --strict --verbose=2 "$APP"

          # --- notarization credentials (API key + its id + issuer) ---
          NOTARIZE=0
          if [ -n "${MACOS_APP_CONNECT_KEY_GERAMY:-}" ] && [ -n "${MACOS_APP_CONNECT_KEY_ID:-}" ] && [ -n "${MACOS_APP_CONNECT_ISSUER_ID:-}" ]; then
            if printf '%s' "$MACOS_APP_CONNECT_KEY_GERAMY" | grep -q 'BEGIN PRIVATE KEY'; then
              printf '%s' "$MACOS_APP_CONNECT_KEY_GERAMY" > "$RUNNER_TEMP/api_key.p8"
            else
              printf '%s' "$MACOS_APP_CONNECT_KEY_GERAMY" | base64 --decode > "$RUNNER_TEMP/api_key.p8"
            fi
            NOTARIZE=1
          fi

          # --- notarize + STAPLE THE .app FIRST ---
          # Critical: staple the ticket to the .app itself, not just the .pkg.
          # Without this the installed app has no local ticket, so Gatekeeper must
          # verify online on first launch — and a customer who is offline (or hits
          # a flaky check) gets "can't be opened". Stapling makes first launch work
          # offline. (The .pkg is stapled separately below.)
          if [ "$NOTARIZE" = 1 ]; then
            APPZIP="$RUNNER_TEMP/${APP_NAME}.zip"
            ditto -c -k --keepParent "$APP" "$APPZIP"
            xcrun notarytool submit "$APPZIP" \
              --key "$RUNNER_TEMP/api_key.p8" \
              --key-id "$MACOS_APP_CONNECT_KEY_ID" \
              --issuer "$MACOS_APP_CONNECT_ISSUER_ID" \
              --wait
            xcrun stapler staple "$APP"
            xcrun stapler validate "$APP"
          fi

          # --- build the signed installer from the (now stapled) app ---
          PKG="dist/${APP_NAME}-${APP_VERSION}-macos.pkg"
          productbuild --component "$APP" /Applications --sign "$INST_ID" --timestamp "$PKG"

          # --- notarize + staple the .pkg too ---
          if [ "$NOTARIZE" = 1 ]; then
            xcrun notarytool submit "$PKG" \
              --key "$RUNNER_TEMP/api_key.p8" \
              --key-id "$MACOS_APP_CONNECT_KEY_ID" \
              --issuer "$MACOS_APP_CONNECT_ISSUER_ID" \
              --wait
            xcrun stapler staple "$PKG"
          else
            echo "::warning::Notarization skipped — set MACOS_APP_CONNECT_KEY_GERAMY + MACOS_APP_CONNECT_KEY_ID + MACOS_APP_CONNECT_ISSUER_ID. The app/.pkg are signed but not notarized."
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: installer-macos
          path: dist/*
          if-no-files-found: error

  # ------------------------------------------------------------------ Linux ---
  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve version
        run: |
          V="${{ inputs.version }}"; V="${V#v}"
          if [ -z "$V" ]; then
            V="$(grep -E '^version:' pubspec.yaml | head -1 | sed -E 's/^version:[[:space:]]*//; s/\+.*$//')"
          fi
          echo "APP_VERSION=$V" >> "$GITHUB_ENV"
          echo "Resolved version: $V"

      - name: Install dependencies
        run: flutter pub get

      # git2dart_binaries' linux/CMakeLists.txt bundles a versioned filename
      # (libgit2-1.6.2.so) but the package actually ships libgit2.so, so the
      # native build fails copying a non-existent file. Point it at the real name.
      - name: Patch git2dart_binaries native lib names (Linux)
        run: |
          set -euo pipefail
          CM="$(find "${PUB_CACHE:-$HOME/.pub-cache}" -path '*git2dart_binaries*/linux/CMakeLists.txt' 2>/dev/null | head -1)"
          if [ -z "$CM" ]; then echo "git2dart_binaries linux/CMakeLists.txt not found" >&2; exit 1; fi
          DIR="$(dirname "$CM")"
          echo "Patching $CM"
          # The upstream bundled list hard-codes a versioned libgit2 name the package
          # no longer ships, and omits libssh2.so — which libgit2 depends on, so the
          # Linux app would crash at launch the same way macOS did. Fix the name and
          # add libssh2.so so both get bundled.
          sed -i 's#libgit2-1\.6\.2\.so#libgit2.so#g' "$CM"
          if [ -f "$DIR/libssh2.so" ] && ! grep -q 'libssh2\.so' "$CM"; then
            sed -i 's#\(.*CMAKE_CURRENT_SOURCE_DIR}/libgit2\.so".*\)#\1\n  "${CMAKE_CURRENT_SOURCE_DIR}/libssh2.so"#' "$CM"
          fi
          grep -n -A6 bundled_libraries "$CM" || true

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Linux (release)
        run: flutter build linux --release --build-name=${{ env.APP_VERSION }} --build-number=${{ github.run_number }}

      - name: Package (tar.gz + .deb)
        run: |
          set -euo pipefail
          BUNDLE=build/linux/x64/release/bundle
          mkdir -p dist

          # Portable tarball
          tar -C "$BUNDLE" -czf "dist/${APP_NAME}-${APP_VERSION}-linux-x64.tar.gz" .

          # Debian package
          PKGROOT="$(mktemp -d)"
          mkdir -p "$PKGROOT/opt/${APP_NAME}" "$PKGROOT/usr/bin" \
                   "$PKGROOT/usr/share/applications" "$PKGROOT/DEBIAN"
          cp -r "$BUNDLE"/. "$PKGROOT/opt/${APP_NAME}/"
          ln -s "/opt/${APP_NAME}/${APP_NAME}" "$PKGROOT/usr/bin/${APP_NAME}"

          cat > "$PKGROOT/usr/share/applications/${APP_NAME}.desktop" <<EOF
          [Desktop Entry]
          Name=${PRETTY_NAME}
          Exec=/opt/${APP_NAME}/${APP_NAME}
          Type=Application
          Categories=Development;
          Terminal=false
          EOF

          cat > "$PKGROOT/DEBIAN/control" <<EOF
          Package: ${APP_NAME//_/-}
          Version: ${APP_VERSION}
          Section: devel
          Priority: optional
          Architecture: amd64
          Depends: libgtk-3-0, libblkid1, liblzma5
          Maintainer: Geramy Loveless DBA Nexus Projects <support@nexus-projects.ai>
          Description: ${PRETTY_NAME} - Agentic Agile + Git + CI Environment
          EOF

          dpkg-deb --build --root-owner-group "$PKGROOT" \
            "dist/${APP_NAME}-${APP_VERSION}-linux-amd64.deb"

      - uses: actions/upload-artifact@v4
        with:
          name: installer-linux
          path: dist/*
          if-no-files-found: error
