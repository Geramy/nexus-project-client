name: Release

# Push a version tag and this builds all three desktop installers and publishes
# a GitHub Release with them attached. Examples:
#   git tag v1.2.3 && git push origin v1.2.3      -> stable release
#   git tag v1.2.3-beta.1 && git push --tags      -> pre-release (tag has a '-')
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Reuse the desktop build pipeline; pass the tag as the version.
  build:
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      version: ${{ github.ref_name }}

  publish:
    # Ship the installers as soon as the desktop build succeeds. The live-AI
    # setup screenshots are intentionally DECOUPLED from the release path: they
    # used to be a `uses:` reusable-workflow call here, but if GitHub fails to
    # resolve/parse that called workflow the ENTIRE release run is invalidated
    # before any job starts — which blocked shipping installers (the in-app
    # updater depends on them). Screenshots are best-effort, so run them on
    # demand via the "Setup screenshots" workflow (workflow_dispatch) instead.
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: installer-*
          merge-multiple: true

      - name: List artifacts
        run: ls -lAR artifacts

      # Publish a SHA256SUMS.txt alongside the installers. The in-app updater
      # fetches this, finds the line for its platform's installer, and verifies
      # the download before launching it. Names are bare basenames so they match
      # the uploaded asset names exactly.
      - name: Generate checksums
        working-directory: artifacts
        run: |
          sha256sum *.pkg *.exe *.deb *.tar.gz *.zip 2>/dev/null > SHA256SUMS.txt
          echo "----- SHA256SUMS.txt -----"
          cat SHA256SUMS.txt

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Nexus Projects ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          # Marketing template first; `generate_release_notes` appends the
          # auto-generated "What's Changed" changelog (commits/PRs) below it.
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: artifacts/**/*
          body: |
            ## Nexus Projects — the agentic project workspace

            A production-grade desktop app where you plan, build, and ship complex
            projects with an AI **Coordinator** at the center — talk to it by **text
            or voice**, and it creates tasks, updates status, proposes plan changes,
            and generates diagrams with full project context.

            ### Highlights
            - **Project Coordinator** — chat or hands-free voice (real Silero VAD with
              end-of-speech detection + OS-level echo cancellation).
            - **Living plans** — Markdown plans (Overview, Client, Server, Database)
              shared as project-wide context for every layer.
            - **Hierarchical tasks** — rich detail panel: Overview, Sub-Tasks, Git
              Changes, Agent Work, and Builds & CI.
            - **Agentic execution** — inference servers, personas, tool calling, and
              live reactive updates throughout.
            - **Strict multi-tenancy** — Client → Project scoping with full isolation.
            - Streaming, tools, image generation, and audio (STT/TTS) out of the box.

            ### Subscription & access
            Nexus Projects runs on the **Nexus Router** — a managed gateway that
            handles authentication, billing, and AI inference. Create an account,
            pick a plan, and manage your subscription at
            **[www.nexus-projects.ai](https://www.nexus-projects.ai)**.

            - Plans, quotas, and add-ons are managed centrally; over-quota usage is
              paced (never hard-blocked) with an in-app upgrade prompt.
            - Sign in from the app's **Account** screen to connect your subscription
              and start routing inference.

            ### Download
            Pick the installer for your platform from **Assets** below:
            - **Windows** — `.exe` installer
            - **macOS** — `.pkg` (signed & notarized)
            - **Linux** — `.deb` package or portable `.tar.gz`

            ---
