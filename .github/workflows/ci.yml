name: CI

# Fast checks on every push to main and on PRs. Analyze + tests only — the
# heavy desktop builds live in build.yml / release.yml.
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # The integration tests drive the real git engine (libgit2 via
      # git2dart_binaries) over a SQLite virtual disk, so ensure the system
      # SQLite + GTK runtime deps are present on the runner.
      - name: System deps for native git/sqlite tests
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-0 libsqlite3-dev

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (riverpod / drift / freezed / json)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .
        continue-on-error: true

      # Fail only on real errors; the project carries known info/warning lints
      # (the *_pk / *_fk DB naming convention, a few unused imports).
      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run unit tests
        run: flutter test

      # Explicit, named gate: drives the real git engine to prove the parallel
      # task workflow (isolated per-task trees → concurrent commits to their own
      # branches → clean merge to main; real conflicts detected; lane serializes).
      - name: Prove the parallel agent workflow (integration)
        run: flutter test test/integration
