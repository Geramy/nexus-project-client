name: nexus_projects_client
description: "Nexus Projects - Agentic Agile + Git + CI Environment"
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.13.0+33

environment:
  sdk: ^3.11.5

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8

  # State Management (following Card-wars patterns)
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Immutable models + code generation
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Navigation
  go_router: ^14.8.1

  # Networking (future use)
  dio: ^5.8.0+1

  # Useful utilities
  collection: ^1.19.1
  intl: ^0.20.2

  # Reactive cross-platform SQLite (Drift) - chosen for real-time DB subscriptions
  # so UI can be directly driven by database changes (local + future remote sync)
  drift: ^2.26.0
  drift_flutter: ^0.2.1
  sqlite3_flutter_libs: ^0.5.0  # for mobile/desktop native SQLite
  sqlite3: ^2.4.0               # direct: per-project SQLite-backed virtual disk (.nxtprj)
  git2dart: ^0.4.0              # libgit2 (FFI) — git engine
  git2dart_binaries: ^1.10.3    # raw libgit2 FFI symbols (custom ODB/refdb backend)
  ffi: ^2.1.0                   # calloc/free for the custom backend structs
  docker2: ^6.1.0               # container-based build/CI execution
  path_provider: ^2.1.4
  path: ^1.9.0
  yaml: ^3.1.2                   # parse .github/workflows/*.yml for the local CI runner
  archive: ^3.6.1                # tar the build context for the Docker Engine API (POST /build)

  # Audio / Voice (for multi-modal coordinator conversations, modeled after lemonade_mobile)
  # Using the exact same versions/commit of the recording + VAD stack that works
  # reliably on macOS desktop in ~/IdeaProjects/lemonade_mobile (record ^6 + vad 0.0.8).
  record: ^6.2.0
  just_audio: ^0.9.36
  permission_handler: ^11.3.1
  http: ^1.2.0
  vad: ^0.0.8  # Same resolved version as lemonade_mobile (the one where audioStream: + v5 works on desktop)
  audio_session: ^0.1.18  # Proper voice chat audio session config (AEC, etc.)

  # Lemonade server management (exact port from ~/IdeaProjects/lemonade_mobile)
  # For local self-managed Lemonade servers that expose omni collections + full admin API.
  # Routed/routed servers (talking to nexus-projects-server) do NOT use this surface.
  flutter_secure_storage: ^9.2.4
  web_socket_channel: ^2.4.0
  shared_preferences: ^2.5.5
  flutter_code_editor: ^0.3.5
  flutter_highlight: ^0.7.0
  highlight: ^0.7.0
  gpt_markdown: ^1.1.7
  package_info_plus: ^9.0.1
  crypto: ^3.0.7

# No more record_platform_interface override — we now use the modern record 6.x
# stack that lemonade_mobile successfully uses on macOS. If macOS debug builds
# break again, we will add a more targeted override only for the linux plugin.

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Drives the real setup UI end-to-end in CI (live setup-flow screenshots test).
  integration_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Test-only: lets the live orchestrator E2E route path_provider to a temp dir
  # (PathProviderPlatform.instance) so the orchestrator builds its own disks.
  path_provider_platform_interface: ^2.1.0

  # Code generation
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.5
  freezed: ^3.1.0
  json_serializable: ^6.9.5
  riverpod_lint: ^2.6.5

  # Drift code generation
  drift_dev: ^2.26.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    # Research-generated industry-scoped setup vocabulary (sub-axes + scoped
    # objectives/features/libraries + platform-conditional stacks). Seeded into
    # the SetupScopes/SetupScopeOptions tables on launch.
    - assets/setup/scoped_vocab.json

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
